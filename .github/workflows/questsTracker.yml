name: Discord Quest Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: quest-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Run Quest Tracker
        run: |
          git config --global user.name "quest-tracker [bot]"
          git config --global user.email "quest-tracker@users.noreply.github.com"
          END_TIME=$((SECONDS + 21000))

          while [ $SECONDS -lt $END_TIME ]; do
            START_LOOP=$SECONDS
            echo "--- Khởi động chu kỳ fetch dữ liệu: $(date) ---"
            git pull --rebase --autostash

            node src/main.js \
              --token "${{ secrets.DISCORD_TOKEN }}" \
              --webhook "${{ secrets.MAIN_WEBHOOK }}" \
              --error-webhook "${{ secrets.ERROR_WEBHOOK }}" \
              --github-token "${{ secrets.GITHUB_TOKEN }}" \
              --ping-role "${{ vars.PING_ROLE_ID }}" \
              --locale "${{ vars.LOCALE }}" \
              --repository "${{ github.repository }}" \
            || echo "Somethings is wrongs."

            if [ -f state.json ]; then
              git add state.json
              if ! git diff --cached --quiet; then
                echo "Phát hiện thay đổi ở state.json, đang tiến hành commit..."
                git commit -m "chore: update quest state [skip ci]"
                for attempt in 1 2 3; do
                  if git push; then
                    echo "Push thành công."
                    break
                  fi
                  echo "Push thất bại (lần $attempt/3), pull lại rồi thử tiếp..."
                  git pull --rebase --autostash
                  sleep 5
                done
              else
                echo "Không có thay đổi nào trong trạng thái Quest."
              fi
            fi

            ELAPSED=$((SECONDS - START_LOOP))
            SLEEP_TIME=$((300 - ELAPSED))
            if [ $SLEEP_TIME -le 0 ]; then
              SLEEP_TIME=10
            fi

            echo "Lượt fetch dữ liệu này tốn ${ELAPSED}s. Sẽ nghỉ trong ${SLEEP_TIME}s..."
            sleep $SLEEP_TIME
          done
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
