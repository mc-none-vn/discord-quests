name: Discord Quest Tracker

on:
  workflow_dispatch:   # chạy thủ công khi cần
  schedule:
    - cron: "*/5 * * * *"   # mỗi 5 phút

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🎯 Run Quest Tracker
        run: |
          node src/main.js \
            --token         "${{ secrets.DISCORD_TOKEN }}" \
            --webhook       "${{ secrets.MAIN_WEBHOOK }}" \
            --error-webhook "${{ secrets.ERROR_WEBHOOK }}" \
            --ping-role     "${{ secrets.PING_ROLE_ID }}" \
            --locale        vi

      - name: 💾 Commit state
        run: |
          git config --global user.name  "quest-tracker[bot]"
          git config --global user.email "quest-tracker@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update quest state [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
